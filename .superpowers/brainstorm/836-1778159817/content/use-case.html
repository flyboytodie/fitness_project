<h2>健身应用的主要使用场景</h2>
<p class="subtitle">这会影响整个应用的功能设计和数据架构</p>

<div class="options">
  <div class="option" data-choice="personal" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>个人健身追踪</h3>
      <p>记录自己的每日训练、查看进度统计，适合普通健身爱好者</p>
    </div>
  </div>
  
  <div class="option" data-choice="gym" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>健身房/工作室管理</h3>
      <p>教练管理多个会员的课程安排和训练数据</p>
    </div>
  </div>
  
  <div class="option" data-choice="team" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>企业/团队健身</h3>
      <p>公司内部健身挑战、团队竞赛排行榜</p>
    </div>
  </div>
  
  <div class="option" data-choice="online" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>线上健身课程平台</h3>
      <p>跟练视频课程、教练在线指导</p>
    </div>
  </div>
</div>
